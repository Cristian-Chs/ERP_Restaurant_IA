databases:
  - name: telegram_bot_db
    databaseName: telegram_bot
    user: telegram_user
    plan: free

services:
  - type: web
    name: react-python-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "cd Backend && gunicorn backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: telegram_bot_db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 2
    plan: free
